<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Base: near-black -->
    <radialGradient id="glow" cx="0.5" cy="0.85" r="0.7">
      <stop offset="0%" stop-color="#7a1a1a" />
      <stop offset="40%" stop-color="#4a0e1a" />
      <stop offset="75%" stop-color="#1a0a10" />
      <stop offset="100%" stop-color="#0d0d0d" />
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="48" fill="#0d0d0d" />
  <rect width="256" height="256" rx="48" fill="url(#glow)" />

  <!-- Car silhouette (Lucide car, vertically centered) -->
  <!-- Car visual bounds: y 7-19 (height 12), x 1-22 (width 21), center=(11.5, 13) -->
  <g transform="translate(128, 128) scale(8) translate(-12, -13)" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" />
    <circle cx="7" cy="17" r="2" />
    <path d="M9 17h6" />
    <circle cx="17" cy="17" r="2" />
  </g>

  <!-- Red plus badge overlapping bottom-right of car -->
  <circle cx="204" cy="188" r="30" fill="#c0392b" />
  <line x1="204" y1="172" x2="204" y2="204" stroke="white" stroke-width="6" stroke-linecap="round" />
  <line x1="188" y1="188" x2="220" y2="188" stroke="white" stroke-width="6" stroke-linecap="round" />
</svg>

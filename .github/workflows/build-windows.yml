name: Build Windows app

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate release version
        run: python scripts/check_release_version.py "${{ github.event.release.tag_name }}"

      - name: Install dependencies
        run: |
          pip install pymyhondaplus PyQt6 pyinstaller Pillow

      - name: Install app
        run: pip install -e .

      - name: Convert SVG icon to ICO
        run: |
          python -c "
          from PIL import Image
          from PyQt6.QtSvg import QSvgRenderer
          from PyQt6.QtGui import QImage, QPainter
          from PyQt6.QtCore import QSize, Qt
          from PyQt6.QtWidgets import QApplication
          import sys
          app = QApplication(sys.argv)
          renderer = QSvgRenderer('src/myhondaplus_desktop/icons/app-icon.svg')
          sizes = [16, 32, 48, 64, 128, 256]
          images = []
          for sz in sizes:
              img = QImage(QSize(sz, sz), QImage.Format.Format_ARGB32)
              img.fill(Qt.GlobalColor.transparent)
              painter = QPainter(img)
              renderer.render(painter)
              painter.end()
              img.save(f'icon_{sz}.png')
              images.append(Image.open(f'icon_{sz}.png'))
          images[0].save('app-icon.ico', format='ICO', sizes=[(s, s) for s in sizes], append_images=images[1:])
          "

      - name: Build .exe
        run: python scripts/build_pyinstaller.py --name "My-Honda-for-desktop-Windows" --icon app-icon.ico --onefile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: My Honda+ for desktop (Windows)
          path: "dist/My-Honda-for-desktop-Windows.exe"

      - name: Attach to release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/My-Honda-for-desktop-Windows.exe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

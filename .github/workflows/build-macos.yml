name: Build macOS app

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          brew install librsvg
          pip install pymyhondaplus PyQt6 pyinstaller

      - name: Install app
        run: pip install -e .

      - name: Convert SVG icon to ICNS
        run: |
          mkdir -p icon.iconset
          rsvg-convert -w 1024 -h 1024 src/myhondaplus_desktop/icons/app-icon.svg -o icon_1024.png
          sips -z 16 16     icon_1024.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon_1024.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon_1024.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon_1024.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon_1024.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon_1024.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon_1024.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon_1024.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon_1024.png --out icon.iconset/icon_512x512.png
          cp icon_1024.png  icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o app-icon.icns

      - name: Build .app bundle
        run: |
          pyinstaller \
            --name "My Honda+ for desktop" \
            --windowed \
            --icon app-icon.icns \
            --add-data "src/myhondaplus_desktop/icons:myhondaplus_desktop/icons" \
            --hidden-import myhondaplus_desktop \
            --hidden-import myhondaplus_desktop.widgets \
            --hidden-import myhondaplus_desktop.widgets.login \
            --hidden-import myhondaplus_desktop.widgets.dashboard \
            --hidden-import myhondaplus_desktop.widgets.commands \
            --hidden-import myhondaplus_desktop.widgets.status_bar \
            --hidden-import pymyhondaplus \
            --hidden-import pymyhondaplus.storage \
            src/myhondaplus_desktop/__main__.py

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "My Honda+ for desktop" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "My Honda+ for desktop.app" 150 200 \
            --app-drop-link 450 200 \
            "My Honda+ for desktop.dmg" \
            "dist/My Honda+ for desktop.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "My Honda+ for desktop.dmg"

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: "dist/My Honda+ for desktop.app"

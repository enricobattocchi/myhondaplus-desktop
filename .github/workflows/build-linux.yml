name: Build Linux AppImage

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate release version
        run: python scripts/check_release_version.py "${{ github.event.release.tag_name }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon0 libxkbcommon-x11-0 libfuse2

      - name: Install Python dependencies
        run: |
          pip install pymyhondaplus PyQt6 pyinstaller

      - name: Install app
        run: pip install -e .

      - name: Get version
        id: version
        run: echo "version=$(python -c 'from myhondaplus_desktop import __version__; print(__version__)')" >> "$GITHUB_OUTPUT"

      - name: Build with PyInstaller
        run: python scripts/build_pyinstaller.py --name "My Honda+ for desktop"

      - name: Create AppImage
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          # Build AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps AppDir/usr/share/applications AppDir/usr/share/metainfo

          # Copy PyInstaller output
          cp -r "dist/My Honda+ for desktop"/* AppDir/usr/bin/

          # Convert SVG to PNG for AppImage icon
          pip install cairosvg
          python -c "import cairosvg; cairosvg.svg2png(url='src/myhondaplus_desktop/icons/app-icon.svg', write_to='AppDir/usr/share/icons/hicolor/256x256/apps/myhondaplus-desktop.png', output_width=256, output_height=256)"
          cp AppDir/usr/share/icons/hicolor/256x256/apps/myhondaplus-desktop.png AppDir/myhondaplus-desktop.png

          # Desktop entry
          cat > AppDir/myhondaplus-desktop.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=My Honda+ for desktop
          Comment=Unofficial GUI for Honda Connect Europe
          Exec=My Honda+ for desktop
          Icon=myhondaplus-desktop
          Categories=Utility;
          DESKTOP
          cp AppDir/myhondaplus-desktop.desktop AppDir/usr/share/applications/

          # AppStream metainfo
          cat > AppDir/usr/share/metainfo/myhondaplus-desktop.appdata.xml << 'APPDATA'
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>myhondaplus-desktop</id>
            <name>My Honda+ for desktop</name>
            <summary>Unofficial GUI for Honda Connect Europe</summary>
            <metadata_license>FSFAP</metadata_license>
            <project_license>GPL-3.0-or-later</project_license>
            <description>
              <p>
                Unofficial desktop application for Honda Connect Europe (My Honda+).
                Monitor your vehicle's battery, range, charge status, door locks,
                climate, and trip history. Send remote commands and manage geofences
                on an interactive map. Not affiliated with Honda Motor Co., Ltd.
              </p>
            </description>
            <categories>
              <category>Utility</category>
            </categories>
            <url type="homepage">https://github.com/enricobattocchi/myhondaplus-desktop</url>
            <url type="bugtracker">https://github.com/enricobattocchi/myhondaplus-desktop/issues</url>
            <launchable type="desktop-id">myhondaplus-desktop.desktop</launchable>
            <provides>
              <binary>My Honda+ for desktop</binary>
            </provides>
            <content_rating type="oars-1.1" />
          </component>
          APPDATA

          # AppRun
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/My Honda+ for desktop" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Build AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir "My-Honda-for-desktop-${{ steps.version.outputs.version }}-x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: My Honda+ for desktop (Linux)
          path: "My-Honda-for-desktop-${{ steps.version.outputs.version }}-x86_64.AppImage"

      - name: Attach to release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" "My-Honda-for-desktop-${{ steps.version.outputs.version }}-x86_64.AppImage"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        name: Classify changed files
        shell: bash
        run: |
          base_sha="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]]; then
            base_sha="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi

          if [ -n "$base_sha" ]; then
            changed_files="$(git diff --name-only "$base_sha" "$GITHUB_SHA")"
          else
            changed_files="$(git ls-files)"
          fi

          code_changed=false
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in
              *.md|docs/*|docs/**|scripts/check_agents_mirror.py|.github/workflows/agents-docs.yml)
                ;;
              *)
                code_changed=true
                ;;
            esac
          done <<< "$changed_files"

          echo "code_changed=$code_changed" >> "$GITHUB_OUTPUT"

  test:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v

  package-smoke:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxcb-cursor0 \
            libxkbcommon0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-xkb1 \
            libxcb-shape0 \
            libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" pyinstaller

      - name: Build Linux bundle
        run: python scripts/build_pyinstaller.py --name "My Honda+ for desktop"

      - name: Smoke test Linux bundle
        run: |
          python scripts/smoke_test_bundle.py \
            --bundle-root "dist/My Honda+ for desktop" \
            --executable "dist/My Honda+ for desktop/My Honda+ for desktop"

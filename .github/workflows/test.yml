name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxcb-cursor0 libxkbcommon0

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" pyinstaller

      - name: Build Linux bundle
        run: python scripts/build_pyinstaller.py --name "My Honda+ for desktop"

      - name: Smoke test Linux bundle
        run: |
          python scripts/smoke_test_bundle.py \
            --bundle-root "dist/My Honda+ for desktop" \
            --executable "dist/My Honda+ for desktop/My Honda+ for desktop"
